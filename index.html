<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農場管理システム</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">

  <!-- アイコン・マップ・UIフレームワーク -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- React 18（本番ビルド: 開発ビルドは約2.2MBあり低速回線で初期表示が数十秒遅れるため .production.min を使用） -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- PDF / Excel 出力ライブラリ(jsPDF/html2canvas/xlsx 計約1.5MB)は初期ロードから外し、
       出力ボタンを押した時に config.js の ensurePdfLibs()/ensureXlsx() で遅延ロードする。
       日々の記録入力（特に低速回線の現場スタッフ）の初期表示を軽くするため。 -->

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- アプリスタイル -->
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="app"></div>
<!-- PDF プレビュー領域（画面外に隠す） -->
<div id="pdf-preview"></div>
<div id="crop-plan-pdf-preview" style="display:none;position:fixed;left:-9999px;top:0"></div>
<div id="diary-pdf-preview"     style="display:none;position:fixed;left:-9999px;top:0"></div>

<!-- アプリ本体 (読み込み順序は依存関係に従う) -->
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
