<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農場管理システム</title>

  <!-- ===== A-1: CDN読み込み ===== -->
  <link  rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link  rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- ===== C-2: PDF出力用CDN ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- ===== C-3: Excel出力用CDN ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ============================================================
       PREMIUM LIGHT v2 — 農場管理システム
       ─────────────────────────────────────
       背景         #F2F5F2  緑みの優しいオフホワイト（農地・自然感）
       サイドバー   #FFFFFF  純白で清潔感・カードと同トーン
       カード        #FFFFFF  + 立体感あるシャドウ
       ─────────────────────────────────────
       Accent palette (宝石色系 × 高彩度):
         Forest     #0A6B52  フォレストグリーン（プライマリ）
         Sapphire   #1D4ED8  サファイアブルー
         Amber      #B45309  バーントアンバー
         Coral      #C2410C  コーラルレッド
         Amethyst   #6D28D9  アメジスト
         Gold line  #B8976A  ゴールド（ライン装飾）
       ─────────────────────────────────────
       テキスト     #111827  深チャコール
       サブ         #64748B
       ボーダー     #E2E8E2
    ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* ===== デザイントークン（第1章） ===== */
    :root{
      --radius-sm: 4px;   /* 入力欄・小ボタン */
      --radius-md: 6px;   /* カード・パネル */
      --radius-lg: 8px;   /* 大きいカード・モーダル上限 */
      --border-color: #D8E0DA;
      --shadow-flat: 0 1px 2px rgba(17,24,39,.05);
    }

    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%}
    body{font-family:'Inter',system-ui,sans-serif;background:#FAFBFA;color:#111827;line-height:1.6}
    #app{width:100%;height:100vh;display:flex;overflow:hidden}

    /* ─── サイドバー（ホワイト・左ゴールドライン） ─── */
    .sidebar{
      width:240px;
      background:#F0F4F1;
      border-right:1px solid #DDE8DE;
      display:flex;flex-direction:column;
      padding:0;flex-shrink:0;
      box-shadow:1px 0 0 #DDE8DE, 4px 0 24px rgba(10,107,82,.05);
      overflow-y:auto
    }
    .sb-logo{
      padding:22px 20px 16px;
      border-bottom:1px solid #DDE8DE;
      margin-bottom:8px;
      position:relative
    }
    .sb-logo .farm-name{
      font-size:14px;font-weight:700;color:#111827;
      letter-spacing:0;padding-left:4px
    }
    .sb-logo .farm-sub{
      font-size:10px;color:#94A3B8;margin-top:3px;
      letter-spacing:.06em;font-weight:500;padding-left:4px;
      text-transform:uppercase
    }
    .nav-wrap{padding:4px 10px}
    .nav-section{
      font-size:11px;font-weight:700;color:#94A3B8;
      letter-spacing:.06em;text-transform:uppercase;
      padding:12px 10px 4px
    }
    .nav-item{
      display:flex;align-items:center;gap:10px;
      padding:9px 10px;border-radius:var(--radius-lg);cursor:pointer;
      font-size:13px;color:#64748B;margin-bottom:1px;
      transition:all .12s;border:none;background:none;
      width:100%;text-align:left;font-weight:600;
      position:relative
    }
    .nav-item:hover{background:#F0F8F4;color:#0A6B52}
    .nav-item.active{
      background:#FFFFFF;
      color:#0A6B52;font-weight:600
    }
    .nav-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0;vertical-align:-2px}
    .nav-item.active .nav-icon{color:#0A6B52}

    /* ─── 圃場展開サブメニュー ─── */
    .nav-field-group{margin-bottom:2px}
    .nav-field-parent{
      display:flex;align-items:center;gap:10px;
      padding:9px 10px;border-radius:var(--radius-lg);cursor:pointer;
      font-size:13px;color:#64748B;
      transition:all .18s;border:none;background:none;
      width:100%;text-align:left;font-weight:600;position:relative;
      white-space:nowrap;overflow:hidden
    }
    .nav-field-parent:hover{background:#F0F8F4;color:#0A6B52}
    .nav-field-parent.open{color:#0A6B52;background:#F0F8F4}
    .nav-field-caret{
      margin-left:auto;font-size:10px;color:#94A3B8;
      transition:transform .3s cubic-bezier(.4,0,.2,1);flex-shrink:0
    }
    .nav-field-parent.open .nav-field-caret{transform:rotate(90deg)}
    .nav-field-sub-wrap{
      overflow:hidden;
      transition:height .32s cubic-bezier(.4,0,.2,1), opacity .28s ease;
      opacity:1
    }
    .nav-field-sub-wrap.closed{opacity:0}
    .nav-field-sub{
      margin-left:14px;padding-left:10px;
      border-left:2px solid #DDE8DE;
      display:flex;flex-direction:column;gap:1px;
      margin-top:2px;margin-bottom:4px;
    }
    .nav-sub-item{
      display:flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:7px;cursor:pointer;
      font-size:11px;color:#64748B;font-weight:500;
      transition:all .1s;border:none;background:none;
      width:100%;text-align:left;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    .nav-sub-item:hover{background:#F0F8F4;color:#0A6B52}
    .nav-sub-item.active{
      background:#FFFFFF;color:#0A6B52;font-weight:600
    }

    /* ─── メインエリア ─── */
    .main{flex:1;overflow:auto;background:#FAFBFA;min-width:0;width:0;display:flex;flex-direction:column}
    .page{padding:28px 32px;box-sizing:border-box;flex:1;display:flex;flex-direction:column}
    /* 画面いっぱいに伸ばしたい末尾コンテンツに付けるクラス */
    .page-grow{flex:1;min-height:0}
    /* グリッドの場合はセルをstretchして中身が伸びるようにする */
    .page-grow[style*="grid"]{align-items:stretch!important}
    .page-title{
      font-size:22px;font-weight:700;color:#111827;
      margin-bottom:8px;letter-spacing:-.02em;
      line-height:1.25
    }
    .page-sub{font-size:14px;color:#64748B;margin-bottom:28px}
    .eyebrow{
      font-size:11px;font-weight:600;letter-spacing:.12em;
      color:#9CA3AF;text-transform:uppercase;margin-bottom:4px;
      margin-top:0;line-height:1.4
    }

    /* ─── カード ─── */
    .card{
      background:#FFFFFF;
      border-radius:var(--radius-md);padding:20px;
      box-shadow:var(--shadow-flat);border:1px solid var(--border-color)
    }
    .card-sm{
      background:#FFFFFF;
      border-radius:var(--radius-md);padding:16px;
      box-shadow:var(--shadow-flat);border:1px solid var(--border-color)
    }
    /* ─── データテーブル専用カード（I-04） ─── */
    .card-data{padding:0}
    .card-data > .section-title{padding:14px 20px 0;margin-bottom:8px}

    /* ─── 統計カード（カラフル上ボーダー） ─── */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
    .stat-card{
      background:#FFFFFF;
      border-radius:var(--radius-md);padding:16px 18px;
      box-shadow:var(--shadow-flat);border:1px solid var(--border-color)
    }

    .stat-n{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em;margin-top:4px}
    .stat-l{font-size:10px;color:#94A3B8;margin-top:8px;font-weight:600;text-transform:uppercase;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat-card.green .stat-n{color:#0A6B52}
    .stat-card.amber .stat-n{color:#B45309}
    .stat-card.red   .stat-n{color:#C2410C}
    .stat-card.blue  .stat-n{color:#1D4ED8}

    /* ─── プログレス ─── */
    .prog-wrap{margin-bottom:24px}
    .prog-label{font-size:12px;color:#64748B;margin-bottom:6px;display:flex;justify-content:space-between;font-weight:500}
    .prog-bg{background:#D8E8D8;border-radius:6px;height:8px;overflow:hidden}
    .prog-fill{height:100%;border-radius:6px;background:#0A6B52;transition:width .6s}

    /* ─── アラート ─── */
    .alert-card{
      background:#FFFBEB;border:1px solid #FDE68A;
      border-radius:var(--radius-lg);
      padding:11px 14px;margin-bottom:8px;
      display:flex;align-items:center;gap:10px;
      font-size:14px;color:#78350F
    }

    /* ─── バッジ（宝石色） ─── */
    .badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:.06em}
    .badge-green{background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
    .badge-amber{background:#FFFBEB;color:#78350F;border:1px solid #FDE68A}
    .badge-red  {background:#FFF7ED;color:#9A3412;border:1px solid #FDBA74}
    .badge-blue {background:#EFF6FF;color:#1E3A8A;border:1px solid #93C5FD}
    .badge-gray {background:#F8FAFC;color:#475569;border:1px solid #CBD5E1}

    /* ─── テーブル ─── */
    .table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.5}
    .table th{
      text-align:left;font-size:10px;font-weight:700;
      color:#64748B;text-transform:uppercase;letter-spacing:.06em;
      padding:9px 14px 9px 20px;border-bottom:2px solid #E2E8E2;
      background:#F8FAF8
    }
    .table td{padding:14px 14px 14px 20px;border-bottom:1px solid #EDF2ED;color:#374151;vertical-align:middle}
    .table tr:last-child td{border-bottom:none}
    .table tr:hover td{background:#F0FDF4}

    /* ─── フォーム ─── */
    .form-group{margin-bottom:20px}
    .form-label{font-size:11px;color:#374151;margin-bottom:8px;display:block;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .form-input{
      width:100%;background:#FFFFFF;border:1.5px solid #D8E4D8;
      border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;
      color:#111827;outline:none;transition:all .15s
    }
    .form-input:focus{border-color:#0A6B52;box-shadow:0 0 0 3px rgba(10,107,82,.1)}
    .form-input::placeholder{color:#B8C9B8}
    .form-select{
      width:100%;background:#FFFFFF;border:1.5px solid #D8E4D8;
      border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;
      color:#111827;outline:none;transition:all .15s
    }
    .form-select:focus{border-color:#0A6B52;box-shadow:0 0 0 3px rgba(10,107,82,.1)}
    select option{background:#fff;color:#111827}

    /* ─── ボタン ─── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;letter-spacing:0}
    .btn-primary{
      background:#0A6B52;
      color:#FFFFFF;
      box-shadow:none
    }
    .btn-primary:hover{
      background:#085A45;
      box-shadow:none
    }
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
    .btn-ghost{
      background:#FFFFFF;color:#374151;
      border:1.5px solid #D8E4D8;
      box-shadow:none
    }
    .btn-ghost:hover{background:#F6FAF6;color:#111827;border-color:#94A3B8}

    /* ─── ステップUI ─── */
    .step-indicator{display:flex;gap:8px;margin-bottom:24px}
    .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .step-dot.done  {background:#0A6B52;color:#FFFFFF}
    .step-dot.active{background:#FFFFFF;color:#0A6B52;border:2px solid #0A6B52}
    .step-dot.pending{background:#F1F5F1;color:#B8C9B8;border:1.5px solid #D8E4D8}
    .step-line{flex:1;height:1px;background:#D8E4D8;margin-top:14px}

    /* ─── GAP ─── */
    .gap-check-cat{background:#FFFFFF;border:1px solid var(--border-color);border-radius:var(--radius-md);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow-flat)}
    .gap-cat-hdr{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;color:#111827}
    .gap-cat-hdr:hover{background:#F0FDF4}
    .gap-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid #EDF2ED;font-size:14px;color:#64748B;cursor:pointer}
    .gap-item:hover{background:#F0FDF4}
    .gap-item.done{color:#065F46;font-weight:500}

    /* ─── カレンダー ─── */
    .cal-day{background:#FFFFFF;border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:6px;min-height:60px;font-size:12px;box-shadow:var(--shadow-flat)}
    .cal-day-num{font-weight:700;color:#64748B;margin-bottom:4px}
    .cal-event{border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:10px;font-weight:600}
    .cal-event.own {background:#ECFDF5;color:#065F46;border:1px solid #6EE7B7}
    .cal-event.rent{background:#FFFBEB;color:#78350F;border:1px solid #FDE68A}

    /* ─── その他 ─── */
    .section-title{
      font-size:10px;font-weight:600;color:#94A3B8;
      margin-bottom:12px;text-transform:uppercase;letter-spacing:.06em
    }
    .field-card{
      background:#FFFFFF;border:1px solid var(--border-color);
      border-radius:var(--radius-md);padding:16px;cursor:pointer;
      transition:all .15s;
      box-shadow:var(--shadow-flat)
    }
    .field-card:hover{
      border-color:#0A6B52;
      box-shadow:none
    }
    .field-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .staff-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
    #field-map{flex:1;min-height:320px;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-color);box-shadow:var(--shadow-flat)}
    .sup-note{background:#ECFDF5;border:1px solid #6EE7B7;border-radius:var(--radius-lg);padding:10px 12px;font-size:12px;color:#065F46;font-weight:500}

    /* ─── PDF出力用（画面外） ─── */
    #pdf-preview{
      position:fixed;left:-9999px;top:0;
      background:#fff;color:#000;
      font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif;
      font-size:11px;padding:28px 32px;width:794px
    }
    /* ── GAP様式ヘッダー ── */
    #pdf-preview .pdf-doc-header{
      border:2px solid #0A6B52;border-radius:4px;
      overflow:hidden;margin-bottom:14px
    }
    #pdf-preview .pdf-doc-header-top{
      background:#0A6B52;color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 14px
    }
    #pdf-preview .pdf-doc-title{
      font-size:17px;font-weight:700;letter-spacing:.08em
    }
    #pdf-preview .pdf-doc-subtitle{
      font-size:9px;letter-spacing:.05em;opacity:.85;margin-top:2px
    }
    #pdf-preview .pdf-doc-cert-badge{
      text-align:right;font-size:9px;line-height:1.7
    }
    #pdf-preview .pdf-doc-header-body{
      display:grid;grid-template-columns:1fr 1fr 1fr;
      border-top:1px solid #cde8e0
    }
    #pdf-preview .pdf-doc-field{
      padding:7px 12px;border-right:1px solid #cde8e0;font-size:10px
    }
    #pdf-preview .pdf-doc-field:last-child{border-right:none}
    #pdf-preview .pdf-doc-field-label{
      font-size:8px;color:#0A6B52;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px
    }
    #pdf-preview .pdf-doc-field-value{font-weight:600;color:#111}
    /* 公印スペース */
    #pdf-preview .pdf-seal-row{
      display:flex;justify-content:flex-end;margin-bottom:10px
    }
    #pdf-preview .pdf-seal-box{
      width:72px;height:72px;border:1.5px solid #aaa;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:9px;color:#aaa;text-align:center;line-height:1.4;
      margin-left:10px
    }
    #pdf-preview .pdf-seal-label{
      font-size:9px;color:#888;writing-mode:vertical-rl;
      margin-right:4px;align-self:center
    }
    /* テーブル */
    #pdf-preview table{width:100%;border-collapse:collapse;font-size:9.5px}
    #pdf-preview thead tr:first-child th{
      background:#0A6B52;color:#fff;padding:6px 7px;
      text-align:center;font-weight:600;border:1px solid #088060;
      font-size:9px;letter-spacing:.04em
    }
    #pdf-preview td{padding:5px 7px;border:1px solid #ccc;vertical-align:middle;text-align:center}
    #pdf-preview tr:nth-child(even) td{background:#f4faf8}
    /* フッター */
    #pdf-preview .pdf-footer-row{
      display:flex;justify-content:space-between;align-items:flex-end;
      margin-top:14px;padding-top:8px;border-top:1px solid #ddd
    }
    #pdf-preview .pdf-footer-note{font-size:8.5px;color:#777;line-height:1.6}
    #pdf-preview .pdf-footer-page{font-size:8.5px;color:#aaa}

    /* ─── CAT-03: onMouseEnter/Leave をCSSホバーに統一 ─── */
    .cal-day:hover{background:#F0FDF4}
    .manual-card{
      background:#fff;border:1px solid var(--border-color);border-radius:var(--radius-md);
      padding:16px;cursor:pointer;transition:all .15s;
      box-shadow:var(--shadow-flat)
    }
    .manual-card:hover{border-color:#0A6B52}
    /* UX-08: スタッフ追加フォーム アニメーション */
    @keyframes fadeInDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes confirmModalIn{from{opacity:0;transform:scale(.94) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}

    /* ── スムーズ折りたたみ（grid-template-rows 方式） ──
       .smooth-collapse-wrap  : display:grid を持つ外枠
       .smooth-collapse-inner : overflow:hidden を持つ内枠
       JS側は open ? 'smooth-collapse-wrap open' : 'smooth-collapse-wrap' で制御 */
    .smooth-collapse-wrap{
      display:grid;
      grid-template-rows:0fr;
      transition:grid-template-rows .32s cubic-bezier(.4,0,.2,1),
                 opacity .28s ease;
      opacity:0;
    }
    .smooth-collapse-wrap.open{
      grid-template-rows:1fr;
      opacity:1;
    }
    .smooth-collapse-inner{
      overflow:hidden;
      min-height:0;
    }
  </style>
</head>
<body>
<div id="app"></div>
<!-- C-2: GAP様式 農薬散布記録簿 PDFプレビュー（画面外に隠す） -->
<div id="pdf-preview"></div>
<div id="crop-plan-pdf-preview" style="display:none;position:fixed;left:-9999px;top:0"></div>
<div id="diary-pdf-preview" style="display:none;position:fixed;left:-9999px;top:0"></div>

<!-- ============================================================
     ① CONFIG & ユーティリティ関数
     編集対象: テーマカラー・農園情報・共通計算ロジック
     ============================================================ -->
<script>
// =====================================================
// CAT-01: CONFIG — マジックナンバー・ハードコード値の集約
// テーマカラー・閾値・農園情報をここで一元管理
// =====================================================
const CONFIG = {
  FARM_NAME:     '○○農事組合法人',
  JGAP_CERT_NO:  'JGAP-XXXX-XXXXX',
  COLOR: {
    primary:      '#0A6B52',   // フォレストグリーン
    primaryDark:  '#085A45',   // プライマリ暗色（ホバー・押下状態）
    sapphire:     '#1D4ED8',   // サファイアブルー
    amber:        '#B45309',   // バーントアンバー
    red:          '#C2410C',   // コーラルレッド
    amethyst:     '#6D28D9',   // アメジスト
  },
  CURRENT_YEAR: new Date().getFullYear(),
  // C-5仕様: ビザ期限アラートのしきい値（残日数）。30日以内=urgent(赤)、90日以内=warn(amber)
  VISA_ALERT_DAYS: { urgent: 30, warn: 90 },
}

// ①-2 ビザ・在留期限の残日数を計算（StaffList / VisaPage 共通利用）
// dateStr が未設定なら null を返す
function calcDaysLeft(dateStr) {
  if (!dateStr) return null
  const today  = new Date(); today.setHours(0,0,0,0)
  const target = new Date(dateStr); target.setHours(0,0,0,0)
  return Math.round((target - today) / (1000*60*60*24))
}

// =====================================================
// CAT-02: 共通ユーティリティ関数
// 重複していたビザ残日数計算・農薬使用回数チェックを一本化
// =====================================================
// ② 農薬使用回数チェック（PesticideInput / DailyRecord で重複していたロジック）
function countPesticideUse(records, fieldId, pesticideId) {
  return records.filter(
    r => r.field_id === Number(fieldId) && r.pesticide_id === pesticideId
  ).length
}
function isPesticideOverLimit(records, fieldId, pesticide) {
  if (!pesticide) return false
  return countPesticideUse(records, fieldId, pesticide.id) >= pesticide.max_times
}

// ②-2 収穫前日数アラート（ダッシュボード用）
// 各作付計画の収穫予定（end_month の1日と仮定）に対し、
// 直近の農薬散布が残留期間（preharvest_days）にかかる場合に警告を返す
function calcHarvestRisk(records, plans, pesticides, fields) {
  const today = new Date()
  const alerts = []
  plans.forEach(plan => {
    const harvestDate = new Date(CONFIG.CURRENT_YEAR, plan.end_month, 1) // 収穫予定月の1日
    const daysToHarvest = Math.ceil((harvestDate - today) / 86400000)
    if (daysToHarvest < 0 || daysToHarvest > 60) return // 収穫済み or 60日超先は対象外

    const sprayRecords = records
      .filter(r => r.field_id === plan.field_id && r.work_type === '農薬散布' && r.pesticide_id)
      .sort((a, b) => b.date.localeCompare(a.date))

    sprayRecords.forEach(sr => {
      const pest = pesticides.find(p => p.id === sr.pesticide_id)
      if (!pest) return
      const sprayDate = new Date(sr.date)
      const daysSinceSpray = Math.ceil((today - sprayDate) / 86400000)
      const daysRemaining  = pest.preharvest_days - daysSinceSpray // 残留期間が明けるまでの日数

      // 残留期間が明けていない、かつ収穫予定がその期間内に来る場合は危険
      if (daysRemaining > 0 && daysToHarvest <= daysRemaining) {
        // 【UX改善】残留期間が明ける（＝収穫可能になる）実際の日付を算出
        const harvestableDate = new Date(sprayDate)
        harvestableDate.setDate(harvestableDate.getDate() + pest.preharvest_days)
        alerts.push({
          id: plan.id + '-' + sr.id,
          fieldName: fields.find(f => f.id === plan.field_id)?.name ?? '不明',
          cropName: plan.crop,
          pesticideName: pest.name,
          daysToHarvest,
          daysRemaining,
          harvestableDate,
          harvestableDateLabel: harvestableDate.toLocaleDateString('ja-JP', { month:'long', day:'numeric' }),
        })
      }
    })
  })
  return alerts
}

// ②-3【フェーズE・E-4 Step3 → Step6で精度向上】ロット単位の防除アラート（圃場ダッシュボード用）
// E-0の方針どおり、calcHarvestRisk と同じ「preharvest_days違反チェック」ロジックを
// ロットの収穫予定日（harvest_start）基準で流用する。
// 【Step6】lotSprayRecords（畝マップで選んだ正しいrow_range入り）が存在する場合は、
//   ロットのrow_rangeと突き合わせて「このロットに実際に散布された記録」だけで判定する（精密判定）。
//   該当するlotSprayRecordsが無いロット（畝マップ未導入の圃場や、まだ日報側でしか
//   記録していない場合）は、従来通り「圃場全体の日報」を参考にする簡易判定にフォールバックする。
//   → 既存ロジックを壊さず、精度だけを段階的に上げる安全な実装。
function calcLotHarvestRisk(fieldRecords, lots, pesticides, lotSprayRecords) {
  const today = new Date()
  const alerts = []
  const hasLotSprayData = Array.isArray(lotSprayRecords) && lotSprayRecords.length > 0

  ;(lots || []).forEach(lot => {
    if (lot.status === 'harvested' || lot.status === 'fallow') return
    if (!lot.harvest_start) return
    const harvestDate   = new Date(lot.harvest_start)
    const daysToHarvest = Math.ceil((harvestDate - today) / 86400000)
    if (daysToHarvest < 0 || daysToHarvest > 60) return // 収穫済み or 60日超先は対象外

    // 【Step6】このロットの畝番号と1本でも重なるlotSprayRecordsを抽出（畝単位の正確な紐付け）
    const lotRowSet = parseRowRange(lot.row_range)
    const matchedLotSprays = hasLotSprayData
      ? lotSprayRecords.filter(rec => {
          const recRowSet = parseRowRange(rec.row_range)
          for (const n of recRowSet) { if (lotRowSet.has(n)) return true }
          return false
        })
      : []

    if (matchedLotSprays.length > 0) {
      // ── 精密判定: ロットの畝と重なるlotSprayRecordsだけを参照 ──
      const sorted = [...matchedLotSprays].sort((a, b) => b.date.localeCompare(a.date))
      sorted.forEach(rec => {
        ;(rec.pesticides || []).forEach(item => {
          const pest = pesticides.find(p => p.id === item.pesticide_id)
          if (!pest) return
          const sprayDate      = new Date(rec.date)
          const daysSinceSpray = Math.ceil((today - sprayDate) / 86400000)
          const daysRemaining  = pest.preharvest_days - daysSinceSpray // 残留期間が明けるまでの日数

          if (daysRemaining > 0 && daysToHarvest <= daysRemaining) {
            // 【UX改善】残留期間が明ける（＝収穫可能になる）実際の日付を算出
            const harvestableDate = new Date(sprayDate)
            harvestableDate.setDate(harvestableDate.getDate() + pest.preharvest_days)
            alerts.push({
              id: lot.id + '-ls-' + rec.id + '-' + item.pesticide_id,
              rowRange: lot.row_range,
              variety: lot.variety,
              pesticideName: pest.name,
              daysToHarvest,
              daysRemaining,
              harvestableDate,
              harvestableDateLabel: harvestableDate.toLocaleDateString('ja-JP', { month:'long', day:'numeric' }),
              precise: true, // 畝単位で正確に紐付けられた判定
            })
          }
        })
      })
    } else {
      // ── フォールバック: 畝単位の散布記録が無いロットは、圃場全体の日報を参考にする簡易判定 ──
      const sprayRecords = fieldRecords
        .filter(r => r.work_type === '農薬散布' && r.pesticide_id)
        .sort((a, b) => b.date.localeCompare(a.date))

      sprayRecords.forEach(sr => {
        const pest = pesticides.find(p => p.id === sr.pesticide_id)
        if (!pest) return
        const sprayDate      = new Date(sr.date)
        const daysSinceSpray = Math.ceil((today - sprayDate) / 86400000)
        const daysRemaining  = pest.preharvest_days - daysSinceSpray // 残留期間が明けるまでの日数

        if (daysRemaining > 0 && daysToHarvest <= daysRemaining) {
          // 【UX改善】残留期間が明ける（＝収穫可能になる）実際の日付を算出
          const harvestableDate = new Date(sprayDate)
          harvestableDate.setDate(harvestableDate.getDate() + pest.preharvest_days)
          alerts.push({
            id: lot.id + '-' + sr.id,
            rowRange: lot.row_range,
            variety: lot.variety,
            pesticideName: pest.name,
            daysToHarvest,
            daysRemaining,
            harvestableDate,
            harvestableDateLabel: harvestableDate.toLocaleDateString('ja-JP', { month:'long', day:'numeric' }),
            precise: false, // 圃場全体の日報を参考にした簡易判定
          })
        }
      })
    }
  })
  return alerts
}

// ③ 月次作業サマリー集計（UX-11: ダッシュボードの実績振り返り用）
// records を直近6ヶ月 × 作業種別でグループ化し、グラフ・サマリーカード用に整形する
function aggregateMonthlyWork(records, months = 6) {
  const now = new Date()
  const buckets = []
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1)
    buckets.push({
      key:   d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'),
      label: (d.getMonth() + 1) + '月',
      counts: {},
      total: 0,
    })
  }
  const byKey = Object.fromEntries(buckets.map(b => [b.key, b]))
  records.forEach(r => {
    const key = (r.date || '').slice(0, 7)
    const bucket = byKey[key]
    if (!bucket) return
    bucket.counts[r.work_type] = (bucket.counts[r.work_type] || 0) + 1
    bucket.total += 1
  })
  return buckets
}

// =====================================================
// C02-4: 期間重複チェック共通ユーティリティ
// Equipment(hasConflict) と CropPlan(hasOverlap) の両方で使用
// =====================================================
function hasDateConflict(rentals, equipment, date) {
  return rentals.some(r => r.equipment === equipment && r.date === date)
}
function hasCropOverlap(plans, fieldId, startMonth, endMonth) {
  return plans.some(p =>
    p.field_id === Number(fieldId) &&
    !(endMonth < p.start_month || startMonth > p.end_month)
  )
}

  const today = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' })

  const flatRows = []
  sprayRecords.forEach(r => {
    if (Array.isArray(r.pesticides)) {
      r.pesticides.forEach(p => {
        flatRows.push({
          date: r.date,
          field_id: r.field_id,
          pesticide_id: p.pesticide_id,
          dilution: p.dilution,
          amount: r.spray_volume_L,
          disposal_amount: p.disposal_amount,
          weather: r.weather,
          worker: r.worker,
        })
      })
    } else {
      flatRows.push(r)
    }
  })

  const rows  = flatRows.length === 0
    ? '<tr><td colspan="12" style="text-align:center;color:#888;padding:20px;font-size:11px">農薬散布記録がありません</td></tr>'
    : flatRows.map((r, i) => {
        const field = fields.find(f => f.id === r.field_id)
        const pest  = pesticides.find(p => p.id === r.pesticide_id)
        const disposal = Number(r.disposal_amount) || 0
        return `<tr>

          <td>${r.date}</td>
          <td>${field ? field.name : '—'}</td>
          <td>${field ? field.crop : '—'}</td>
          <td style="text-align:left">${pest  ? pest.name  : '—'}</td>
          <td>${pest  ? pest.reg_no : '—'}</td>
          <td>${r.dilution ? r.dilution + '倍' : '—'}</td>
          <td>${r.amount || '—'}</td>
          <td>${disposal > 0 ? disposal + 'L' : '—'}</td>
          <td>${r.weather || '—'}</td>
          <td>${r.worker || '—'}</td>
          <td>${pest ? pest.preharvest_days + '日' : '—'}</td>
        </tr>`
      }).join('')
  const emptyRows = [1,2,3].map(() =>
    `<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`
  ).join('')

  return `
    <!-- ── 様式ヘッダー ── -->
    <div class="pdf-doc-header">
      <div class="pdf-doc-header-top">
        <div>
          <div class="pdf-doc-title">農薬散布記録簿</div>
          <div class="pdf-doc-subtitle">PESTICIDE APPLICATION RECORD &nbsp;｜&nbsp; JGAP / GlobalGAP 農薬管理基準様式 &nbsp;｜&nbsp; <span style="color:#FCD34D;font-weight:700">※ 仮様式</span></div>
        </div>
        <div class="pdf-doc-cert-badge">
          <div style="font-size:10px;font-weight:700;letter-spacing:.05em">様式番号：GAP-P-001</div>
          <div style="opacity:.8">改訂：Rev.3 &nbsp;｜&nbsp; ${year}年度版</div>
        </div>
      </div>
      <div class="pdf-doc-header-body">
        <div class="pdf-doc-field">
          <div class="pdf-doc-field-label">農業者名称 / Organization</div>
          <div class="pdf-doc-field-value">${CONFIG.FARM_NAME}</div>
        </div>
        <div class="pdf-doc-field">
          <div class="pdf-doc-field-label">JGAP認証番号 / Certificate No.</div>
          <div class="pdf-doc-field-value" style="letter-spacing:.05em">${CONFIG.JGAP_CERT_NO}</div>
        </div>
        <div class="pdf-doc-field">
          <div class="pdf-doc-field-label">出力日 / Issued Date &nbsp;｜&nbsp; 対象件数</div>
          <div class="pdf-doc-field-value">${today} &nbsp;（${sprayRecords.length}件）</div>
        </div>
      </div>
    </div>

    <!-- ── 公印スペース ── -->
    <div class="pdf-seal-row">
      <div class="pdf-seal-label">代表者印</div>
      <div class="pdf-seal-box">公<br>印</div>
      <div class="pdf-seal-label">管理責任者印</div>

// =====================================================
// 【サンプル農園実データ統合 フェーズ6・Step B】crop_category の正式導入
// ─────────────────────────────────────────────────────
// 旧実装は「field.crop === 'とうもろこし'」のような作物名の文字列比較で
// とうもろこし／水稲を判定していた（畝マップ表示切替・水稲ステージ表示など）。
// 今後 field.crop に新しい作物名（例: 大豆・玉ねぎ等）が増えるたびに
// 判定箇所を一つずつ洗い直す必要があり、保守性が低い。
//
// そこで「表示用の作物名（field.crop）」と「システムが分岐に使うカテゴリ
// （field.crop_category）」を分離する。INITIAL_FIELDS本体の各要素は
// 変更せず（既存ロジックを壊さない方針）、生成直後に1回だけ
// crop_category を自動付与するマッピングを通す。
//
//   crop_category: 'leaf_veg' | 'corn' | 'rice'
//   - 'corn'    : とうもろこし（畝マップ表示・トンネル等の専用項目あり）
//   - 'rice'    : 水稲（畝マップなし・生育ステージタイムライン表示）
//   - 'leaf_veg': それ以外（レタス・ターサイ等、従来通り畝マップ表示）
//
// 新しい作物を追加する場合は、この CROP_NAME_TO_CATEGORY に
// 1行追記するだけで crop_category が決まる（未登録の作物名は 'leaf_veg' 扱い）。
// =====================================================
const CROP_NAME_TO_CATEGORY = {
  'とうもろこし': 'corn',
  '水稲':         'rice',
  // 上記以外（レタス・ターサイ・米・トマト・大豆・玉ねぎ・その他）は
  // すべて畝マップで管理する葉物・通常作物として 'leaf_veg' 扱いにする。
}
const getCropCategory = (cropName) => CROP_NAME_TO_CATEGORY[cropName] || 'leaf_veg'

INITIAL_FIELDS.forEach(f => {
  f.crop_category = getCropCategory(f.crop)
})

// =====================================================
// 【実装手順書 Step0】圃場番号 表記ゆれ正規化 ― 検索・表示・登録用ヘルパー
// ─────────────────────────────────────────────────────
// 目的: FIELD_NO_NORMALIZE（紙日報からわかっている表記ゆれ）を、デバッグパネル
// だけでなく実際の入力フォーム・一覧表示でも使えるようにする。
// 見た目（圃場名の表示）は今までと変えず、検索・登録のみ拡張する方針。
//
// 手動登録分（オペレーターが「この表記はこの圃場です」と登録したもの）は
// localStorage に保存し、ページをまたいでも消えないようにする。
// プロップで毎回バケツリレーしなくて済むよう、シンプルな購読の仕組みにしている。
// =====================================================
const FIELD_NO_OVERRIDE_KEY = 'farm_field_no_overrides_v1'
const _fieldNoOverrideListeners = new Set()
function _readFieldNoOverrides() {
  try { return JSON.parse(localStorage.getItem(FIELD_NO_OVERRIDE_KEY) || '{}') } catch { return {} }
}
function _writeFieldNoOverrides(next) {
  try { localStorage.setItem(FIELD_NO_OVERRIDE_KEY, JSON.stringify(next)) } catch {}
  _fieldNoOverrideListeners.forEach(fn => fn(next))
}
// 圃場選択UIから呼び出す共通フック。登録すると同じページを開いている他のUIにも即反映される。
function useFieldNoOverrides() {
  const [overrides, setOverridesState] = React.useState(_readFieldNoOverrides)
  React.useEffect(() => {
    const listener = (next) => setOverridesState(next)
    _fieldNoOverrideListeners.add(listener)
    return () => _fieldNoOverrideListeners.delete(listener)
  }, [])
  const registerOverride = React.useCallback((raw, fieldId) => {
    const key = (raw || '').trim()
    if (!key) return
    _writeFieldNoOverrides({ ..._readFieldNoOverrides(), [key]: fieldId })
  }, [])
  return [overrides, registerOverride]
}

// ある圃場(field)に紐づく「元表記（紙日報での書かれ方）」をすべて集める
// （FIELD_NO_NORMALIZEの定義分 ＋ 手動登録分）
function getFieldRawLabels(field, overrides) {
  const raws = new Set()
  if (field.field_no) raws.add(field.field_no)
  Object.entries(FIELD_NO_NORMALIZE).forEach(([raw, v]) => {
    if (v.canonical === field.field_no) raws.add(raw)
  })
  if (overrides) {
    Object.entries(overrides).forEach(([raw, fid]) => {
      if (Number(fid) === field.id) raws.add(raw)
    })
  }
  return [...raws]
}

// 圃場名・正式番号・元表記のいずれかにマッチするか（検索用）
function fieldMatchesQuery(field, query, overrides) {
  const q = (query || '').trim().toLowerCase()
  if (!q) return true
  if (field.name && field.name.toLowerCase().includes(q)) return true
  if (field.field_no && field.field_no.toLowerCase().includes(q)) return true
  return getFieldRawLabels(field, overrides).some(r => r.toLowerCase().includes(q))
}

// 入力された表記が「既存の圃場にも正規化テーブルにも一致しない＝未登録」かどうか
function isUnregisteredFieldQuery(fields, query, overrides) {
  const q = (query || '').trim()
  if (!q) return false
  const inFields     = fields.some(f => f.field_no === q || f.name === q)
  const inNormalize  = Object.prototype.hasOwnProperty.call(FIELD_NO_NORMALIZE, q)
  const inOverrides  = overrides && Object.prototype.hasOwnProperty.call(overrides, q)
  return !inFields && !inNormalize && !inOverrides
}

// =====================================================
// 【実装手順書 Step0】圃場選択コンボボックス（表記ゆれ対応）
// ─────────────────────────────────────────────────────
// 見た目は通常のプルダウンと同じだが、クリックすると検索欄が開き、
// 圃場名だけでなく「9s」「3n」のような紙日報の元表記でも検索できる。
// 検索語がどの圃場にも一致しない場合は、控えめな黄色バッジで
// 「未登録の表記です」と知らせ、その場でどの圃場の表記かを選んで登録できる。
// =====================================================
function FieldSearchSelect({ fields, value, onChange, placeholder }) {
  const [overrides, registerOverride] = useFieldNoOverrides()
  const selectedField = fields.find(f => String(f.id) === String(value))
  const [open, setOpen]     = React.useState(false)
  const [query, setQuery]   = React.useState('')
  const [registerTarget, setRegisterTarget] = React.useState('')
  const wrapRef = React.useRef(null)

  React.useEffect(() => {
    const onClickOutside = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false) }
    document.addEventListener('mousedown', onClickOutside)
    return () => document.removeEventListener('mousedown', onClickOutside)
  }, [])

  const filtered     = fields.filter(f => fieldMatchesQuery(f, query, overrides))
  const unregistered = isUnregisteredFieldQuery(fields, query, overrides)

  const boxStyle = {
    background:'#FFFFFF', border:'1.5px solid #D8E4D8',
    borderRadius:'7px', padding:'7px 10px', fontSize:'13px',
    color:'#111827', outline:'none', width:'100%', boxSizing:'border-box'
  }

  return React.createElement('div', { ref: wrapRef, style:{ position:'relative' } },
    // 表示部分（既存の<select>と見た目を揃える）
    React.createElement('div', {
      onClick: () => setOpen(o => !o),
      style:{ ...boxStyle, display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer' }
    },
      React.createElement('span', { style:{ color: selectedField ? '#111827' : '#94A3B8' } },
        selectedField
          ? selectedField.name + (selectedField.field_no ? `（${selectedField.field_no}）` : '')
          : (placeholder || '圃場を選択')
      ),
      React.createElement('i', { className:'ti ti-chevron-down', 'aria-hidden':'true', style:{ fontSize:'13px', color:'#94A3B8' } })
    ),
    open && React.createElement('div', {
      style:{
        position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:60,
        background:'#FFFFFF', border:'1px solid #DDE8DE', borderRadius:'8px',
        boxShadow:'0 8px 24px rgba(17,24,39,.14)', padding:'8px',
        display:'flex', flexDirection:'column', gap:'6px'
      }
    },
      React.createElement('input', {
        autoFocus: true,
        value: query,
        onChange: e => setQuery(e.target.value),
        placeholder: '圃場名・番号・元表記（例: 9s, 3n）で検索',
        style:{ ...boxStyle, padding:'6px 8px' }
      }),
      React.createElement('div', { style:{ overflowY:'auto', maxHeight:'200px' } },
        filtered.length === 0
          ? React.createElement('div', { style:{ fontSize:'12px', color:'#94A3B8', padding:'8px 4px' } }, '該当する圃場がありません')
          : filtered.map(f => {
              const raws = getFieldRawLabels(f, overrides).filter(r => r !== f.field_no)
              const isSelected = String(f.id) === String(value)
              return React.createElement('div', {
                key: f.id,
                onClick: () => { onChange(String(f.id)); setOpen(false); setQuery('') },
                style:{
                  display:'flex', alignItems:'center', justifyContent:'space-between', gap:'8px',
                  padding:'7px 8px', borderRadius:'6px', cursor:'pointer', fontSize:'13px',
                  background: isSelected ? '#F0F8F4' : 'transparent'
                }
              },
                React.createElement('span', { style:{ color:'#111827', fontWeight: isSelected ? 600 : 500 } },
                  f.name + (f.field_no ? `（${f.field_no}）` : '')
                ),
                raws.length > 0 && React.createElement('span', { style:{ fontSize:'10px', color:'#94A3B8', flexShrink:0 } },
                  '元表記: ' + raws.join('/')
                )
              )
            })
      ),
      // 未登録の表記に対する控えめな警告 + その場で登録できるミニUI
      unregistered && React.createElement('div', {
        style:{ borderTop:'1px solid #F0F4F0', paddingTop:'6px', marginTop:'2px' }
      },
        React.createElement('div', {
          style:{
            display:'flex', alignItems:'center', gap:'6px', fontSize:'11px',
            color:'#92400E', background:'#FFFBEB', border:'1px solid #FDE68A',
            borderRadius:'6px', padding:'6px 8px'
          }
        },
          React.createElement('span', null, '⚠️'),
          React.createElement('span', null, `「${query}」は未登録の表記です`)
        ),
        React.createElement('div', { style:{ display:'flex', gap:'6px', marginTop:'6px' } },
          React.createElement('select', {
            value: registerTarget,
            onChange: e => setRegisterTarget(e.target.value),
            style:{ ...boxStyle, padding:'5px 6px', fontSize:'12px', flex:1 }
          },
            React.createElement('option', { value:'' }, 'どの圃場の表記？'),
            fields.map(f => React.createElement('option', { key:f.id, value:f.id },
              f.name + (f.field_no ? `（${f.field_no}）` : '')
            ))
          ),
          React.createElement('button', {
            type: 'button',
            disabled: !registerTarget,
            onClick: () => { registerOverride(query, Number(registerTarget)); setRegisterTarget('') },
            style:{
              fontSize:'11px', fontWeight:600, padding:'5px 10px', borderRadius:'6px',
              border:'none', cursor: registerTarget ? 'pointer' : 'not-allowed',
              background: registerTarget ? '#0A6B52' : '#E5E7EB',
              color:      registerTarget ? '#FFFFFF' : '#9CA3AF'
            }
          }, '登録')
        )
      )
    )
  )
}

// 肥料の希釈倍率を、肥料マスタの設定（基本倍率 or 作物別の上書き）から取得するヘルパー。
// 農薬と違い法定の固定値ではないため、ここで返す値は「目安」であり、入力画面側で編集可能にする。
function getSuggestedFertilizerDilution(fertilizer, cropName) {
  if (!fertilizer) return null
  const crop = (cropName || '').trim()
  if (crop && fertilizer.crop_dilutions && fertilizer.crop_dilutions[crop] != null) {
    return fertilizer.crop_dilutions[crop]
  }
  return fertilizer.default_dilution ?? null
}

// 【作付け構造リファクタリング フェーズ1】作付け（crop_cycle）エンティティ
// ─────────────────────────────────────────────────────
// 既存の CROP_PLANS（作付け計画）を土台に、圃場ごとの作付け履歴を
// 正式なエンティティとして管理する。
// status: 'planned'（計画中）/ 'active'（栽培中）/ 'completed'（収穫完了・終了）
// 既存の CROP_PLANS データはそのまま「作付け履歴の初期データ」として転用する。
// =====================================================
const INITIAL_CROP_CYCLES = INITIAL_CROP_PLANS.map(p => ({
  ...p,
  status: 'active',       // 既存データは「現在進行中」として扱う
  year: CONFIG.CURRENT_YEAR,
}))

// 圃場の「現在の作付け」を取得するヘルパー
// ※ 同一圃場に複数のactiveがある場合は最新（id最大）を採用
function getCurrentCropCycle(cropCycles, fieldId) {
  const actives = cropCycles.filter(c => c.field_id === fieldId && c.status === 'active')
  if (actives.length === 0) return null
  return actives.reduce((a, b) => (b.id > a.id ? b : a))
}

// 圃場の作付け履歴を時系列（新しい順）で取得するヘルパー
function getCropCycleHistory(cropCycles, fieldId) {
  return cropCycles
    .filter(c => c.field_id === fieldId)
    .sort((a, b) => b.id - a.id)
}

// ・今月ミニサマリー（農薬散布・施肥・総作業）を先月比付きでグラフ下に統合
// =====================================================
function MonthlySummaryChart({ records }) {
  const [selectedIdx, setSelectedIdx] = React.useState(null)
  const buckets  = aggregateMonthlyWork(records, 6)
  const workKeys = Object.keys(WORK_ICON_MAP).filter(w =>
    buckets.some(b => b.counts[w] > 0)
  )
  const maxTotal = Math.max(1, ...buckets.map(b => b.total))

  // 今月・先月のバケットを取得
  const thisMonth = buckets[buckets.length - 1]
  const lastMonth = buckets[buckets.length - 2]

  const miniStats = [
    {
      label: '今月の農薬散布',
      now:   thisMonth ? (thisMonth.counts['農薬散布'] || 0) : 0,
      prev:  lastMonth ? (lastMonth.counts['農薬散布'] || 0) : null,
      unit:  '回',
      color: '#DC2626',
    },
    {
      label: '今月の施肥',
      now:   thisMonth ? (thisMonth.counts['施肥'] || 0) : 0,
      prev:  lastMonth ? (lastMonth.counts['施肥'] || 0) : null,
      unit:  '回',
      color: '#0D9972',
    },
    {
      label: '今月の総作業',
      now:   thisMonth ? thisMonth.total : 0,
      prev:  lastMonth ? lastMonth.total : null,
      unit:  '件',
      color: '#2563EB',
    },
  ]

  const W = 600, H = 180, padL = 28, padB = 24, padT = 10
  const chartW = W - padL - 8
  const chartH = H - padT - padB
  const barSlot = chartW / buckets.length
  const barW = Math.min(36, barSlot * 0.5)

  const selectedBucket = selectedIdx !== null ? buckets[selectedIdx] : null

  return React.createElement('div', { className:'card', style:{ marginBottom:'24px' } },
    React.createElement(SectionTitle, { icon:'chart-bar' }, '月次作業サマリー（直近6ヶ月）'),

    workKeys.length === 0
      ? React.createElement('div', { style:{ padding:'24px 0', color:'#94A3B8', fontSize:'13px', textAlign:'center' } },
          '直近6ヶ月の作業記録がありません')
      : React.createElement('div', null,

          // --- SVG 棒グラフ（バークリックで内訳展開） ---
          React.createElement('svg', {
            viewBox: '0 0 '+W+' '+H,
            style: { width:'100%', height:'180px', display:'block', cursor:'pointer' }
          },
            React.createElement('line', {
              x1:padL, y1:H-padB, x2:W-4, y2:H-padB,
              stroke:'#E5EDE5', strokeWidth:1
            }),
            ...buckets.map((b, i) => {
              const x = padL + i * barSlot + (barSlot - barW) / 2
              const isSelected = selectedIdx === i
              let yCursor = H - padB
              const segs = workKeys.map(w => {
                const cnt = b.counts[w] || 0
                if (cnt === 0) return null
                const segH = (cnt / maxTotal) * chartH
                yCursor -= segH
                return React.createElement('rect', {
                  key: w,
                  x, y: yCursor, width: barW, height: segH,
                  fill: WORK_ICON_MAP[w].color,
                  rx: 2,
                  opacity: isSelected ? 1 : (selectedIdx !== null ? 0.45 : 1),
                })
              })
              return React.createElement('g', {
                key: b.key,
                onClick: () => setSelectedIdx(selectedIdx === i ? null : i),
                style:{ cursor:'pointer' },
              },
                // ホバー背景
                React.createElement('rect', {
                  x: padL + i * barSlot, y: padT,
                  width: barSlot, height: chartH + 4,
                  fill: isSelected ? '#F0FDF4' : 'transparent',
                  rx: 4,
                }),
                segs,
                b.total > 0 && React.createElement('text', {
                  x: x + barW / 2, y: yCursor - 6,
                  fontSize: 11, fontWeight: isSelected ? 800 : 700,
                  fill: isSelected ? '#0A6B52' : '#374151',
                  textAnchor:'middle'
                }, b.total),
                React.createElement('text', {
                  x: x + barW / 2, y: H - 6,
                  fontSize: 11,
                  fill: isSelected ? '#0A6B52' : '#94A3B8',
                  fontWeight: isSelected ? 700 : 400,
                  textAnchor:'middle'
                }, b.label)
              )
            })
          ),

          // --- 月別内訳パネル（クリック時に展開） ---
          selectedBucket && React.createElement('div', {
            style:{
              margin:'10px 0', padding:'12px 16px',
              background:'#F0FDF4', border:'1px solid #A7F3D0',
              borderRadius:'10px',
            }
          },
            React.createElement('div', {
              style:{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px' }
            },
              React.createElement('span', { style:{ fontSize:'13px', fontWeight:700, color:'#0A6B52' } },
                selectedBucket.label+'の内訳'
              ),
              React.createElement('button', {
                onClick: () => setSelectedIdx(null),
                style:{ background:'none', border:'none', cursor:'pointer', fontSize:'16px', color:'#9CA3AF', lineHeight:1, padding:'2px' }
              }, '✕')
            ),
            React.createElement('div', { style:{ display:'flex', flexWrap:'wrap', gap:'8px' } },
              workKeys.filter(w => (selectedBucket.counts[w] || 0) > 0).map(w =>
                React.createElement('div', {
                  key: w,
                  style:{
                    display:'flex', alignItems:'center', gap:'6px',
                    background:'#fff', border:'1px solid #D1FAE5',
                    borderRadius:'8px', padding:'6px 12px', fontSize:'12px',
                  }
                },
                  React.createElement('span', { style:{ width:8, height:8, borderRadius:'2px', background:WORK_ICON_MAP[w].color, display:'inline-block', flexShrink:0 } }),
                  React.createElement('span', { style:{ color:'#374151' } }, WORK_ICON_MAP[w].emoji+' '+w),
                  React.createElement('span', { style:{ fontWeight:700, color:'#0A6B52', marginLeft:'4px' } }, selectedBucket.counts[w]+'件')
                )
              ),
              selectedBucket.total === 0 && React.createElement('span', { style:{ color:'#94A3B8', fontSize:'12px' } }, 'この月の記録はありません')
            )
          ),

          // --- 凡例 ---
          React.createElement('div', { style:{ display:'flex', flexWrap:'wrap', gap:'12px', marginTop:'8px', paddingTop:'10px', borderTop:'1px solid #EDF2ED' } },
            ...workKeys.map(w =>
              React.createElement('div', { key:w, style:{ display:'flex', alignItems:'center', gap:'5px', fontSize:'11px', color:'#64748B' } },
                React.createElement('span', { style:{ width:'10px', height:'10px', borderRadius:'2px', background:WORK_ICON_MAP[w].color, display:'inline-block' } }),
                WORK_ICON_MAP[w].emoji + ' ' + w
              )
            )
          ),

          // --- 今月ミニサマリー（先月比付き）---
          React.createElement('div', {
            style:{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'10px', marginTop:'16px', paddingTop:'14px', borderTop:'1px solid #EDF2ED' }
          },
            ...miniStats.map(s => {
              const diff = s.prev !== null ? s.now - s.prev : null
              const isUp   = diff !== null && diff > 0
              const isDown = diff !== null && diff < 0
              const isFlat = diff === 0
              return React.createElement('div', {
                key: s.label,
                style:{
                  background:'#F8FAF8', borderRadius:'10px', padding:'12px 14px',
                  border:'1px solid #E2E8E2',
                }
              },
                React.createElement('div', { style:{ fontSize:'10px', color:'#94A3B8', fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase', marginBottom:'4px' } }, s.label),
                React.createElement('div', { style:{ display:'flex', alignItems:'baseline', gap:'6px' } },
                  React.createElement('span', { style:{ fontSize:'24px', fontWeight:700, color: s.color, lineHeight:1 } }, s.now),
                  React.createElement('span', { style:{ fontSize:'12px', color:'#94A3B8' } }, s.unit)
                ),
                diff !== null && React.createElement('div', {
                  style:{
                    display:'flex', alignItems:'center', gap:'3px',
                    marginTop:'5px', fontSize:'11px', fontWeight:600,
                    color: isUp ? '#C2410C' : isDown ? '#0A6B52' : '#94A3B8',
                  }
                },
                  React.createElement('i', {
                    className: isUp ? 'ti ti-arrow-up' : isDown ? 'ti ti-arrow-down' : 'ti ti-minus',
                    style:{ fontSize:'12px' }
                  }),
                  isFlat
                    ? '先月と同じ'
                    : '先月比 '+(isUp ? '+' : '')+diff+s.unit
                )
              )
            })
          )
        )
  )
}

// 【スタッフ カタカナ表記 機能】ローマ字→カタカナ簡易自動変換
// ※ 完全な精度は出せないため「下書き」として生成し、必ず人の手で確認・修正する前提の設計
//    ヘボン式ローマ字を主眼に、よくあるベトナム語・中国語ピンインの綴りにも一部対応
function romajiToKatakana(input) {
  if (!input) return ''
  let s = input.trim().toLowerCase()
  if (!s) return ''

  // 長い綴りから優先的にマッチさせるため、置換テーブルは多文字から並べる
  const rules = [
    // ベトナム語によくある二重母音・子音群
    [/nguyen/g, 'グエン'], [/nguy/g, 'グイ'],
    [/thi/g, 'ティ'], [/th/g, 'ト'],
    [/ph/g, 'フ'], [/ng/g, 'ン'], [/nh/g, 'ニ'],
    [/tr/g, 'チ'], [/gi/g, 'ジ'],
    // 中国語ピンインによくある綴り
    [/zh/g, 'ジ'], [/xi/g, 'シ'], [/qi/g, 'チ'], [/x/g, 'シ'], [/q/g, 'チ'], [/zi/g, 'ズ'],
    // 一般的な英字・ローマ字の音節（長いものから。ch/sh等の2文字パターンは単独音節より先に評価しない）
    [/sha/g,'シャ'],[/shi/g,'シ'],[/shu/g,'シュ'],[/sho/g,'ショ'],[/she/g,'シェ'],
    [/cha/g,'チャ'],[/chi/g,'チ'],[/chu/g,'チュ'],[/cho/g,'チョ'],[/che/g,'チェ'],
    [/ch/g, 'チ'],
    [/kya/g,'キャ'],[/kyu/g,'キュ'],[/kyo/g,'キョ'],
    [/tya/g,'チャ'],[/tyu/g,'チュ'],[/tyo/g,'チョ'],
    [/ja/g,'ジャ'],[/ju/g,'ジュ'],[/jo/g,'ジョ'],[/ji/g,'ジ'],
    [/wa/g,'ワ'],[/wo/g,'ヲ'],[/wi/g,'ウィ'],[/we/g,'ウェ'],
    [/ka/g,'カ'],[/ki/g,'キ'],[/ku/g,'ク'],[/ke/g,'ケ'],[/ko/g,'コ'],
    [/sa/g,'サ'],[/si/g,'シ'],[/su/g,'ス'],[/se/g,'セ'],[/so/g,'ソ'],
    [/ta/g,'タ'],[/ti/g,'ティ'],[/tu/g,'トゥ'],[/te/g,'テ'],[/to/g,'ト'],
    [/na/g,'ナ'],[/ni/g,'ニ'],[/nu/g,'ヌ'],[/ne/g,'ネ'],[/no/g,'ノ'],
    [/ha/g,'ハ'],[/hi/g,'ヒ'],[/hu/g,'フ'],[/fu/g,'フ'],[/he/g,'ヘ'],[/ho/g,'ホ'],
    [/ma/g,'マ'],[/mi/g,'ミ'],[/mu/g,'ム'],[/me/g,'メ'],[/mo/g,'モ'],
    [/ya/g,'ヤ'],[/yu/g,'ユ'],[/yo/g,'ヨ'],
    [/ra/g,'ラ'],[/ri/g,'リ'],[/ru/g,'ル'],[/re/g,'レ'],[/ro/g,'ロ'],
    [/la/g,'ラ'],[/li/g,'リ'],[/lu/g,'ル'],[/le/g,'レ'],[/lo/g,'ロ'],
    [/ga/g,'ガ'],[/gi/g,'ギ'],[/gu/g,'グ'],[/ge/g,'ゲ'],[/go/g,'ゴ'],
    [/za/g,'ザ'],[/zu/g,'ズ'],[/ze/g,'ゼ'],[/zo/g,'ゾ'],
    [/da/g,'ダ'],[/di/g,'ディ'],[/du/g,'ドゥ'],[/de/g,'デ'],[/do/g,'ド'],
    [/ba/g,'バ'],[/bi/g,'ビ'],[/bu/g,'ブ'],[/be/g,'ベ'],[/bo/g,'ボ'],
    [/pa/g,'パ'],[/pi/g,'ピ'],[/pu/g,'プ'],[/pe/g,'ペ'],[/po/g,'ポ'],
    [/van/g,'バン'],[/van$/g,'バン'],
    [/a/g,'ア'],[/i/g,'イ'],[/u/g,'ウ'],[/e/g,'エ'],[/o/g,'オ'],
    [/n/g,'ン'],
    [/m/g,'ム'],  // 末尾等に残りがちな子音の保険ルール（例: Pham→Phaの後にmが残る場合）
  ]

  let out = ''
  // 空白・ハイフンで単語ごとに区切り、単語間は中黒（・）でつなぐ
  const words = s.split(/[\s\-]+/).filter(Boolean)
  out = words.map(word => {
    let w = word
    rules.forEach(([pattern, kana]) => { w = w.replace(pattern, kana) })
    return w
  }).join('・')

  return out
}

// A-1: 統計カード直下に配置
// 発注アラート閾値以下の農薬を赤バッジで一覧 / 全て余裕あり → グリーン
// =====================================================
function PesticideStockWidget({ pesticides, pesticideStock, onNavigate, _inGrid }) {
  const stockOf  = (p) => {
    const s = (pesticideStock || []).find(s => s.pesticide_id === p.id)
    return s ? s.stock_L : (p.stock_L ?? 0)
  }
  const threshOf = (p) => {
    const s = (pesticideStock || []).find(s => s.pesticide_id === p.id)
    return s ? s.alert_threshold_L : (p.alert_threshold_L ?? 0)
  }

  const alertItems = (pesticides || []).filter(p => stockOf(p) <= threshOf(p))
  const hasAlert   = alertItems.length > 0

  // ── 全在庫余裕あり ──
  if (!hasAlert) {
    return React.createElement('div', {
      style:{
        background:'#ECFDF5', border:'1px solid #A7F3D0', borderRadius:'10px',
        padding:'12px 18px', marginBottom: _inGrid ? 0 : '20px',
        display:'flex', alignItems:'center', gap:'12px', flexDirection:'column',
        justifyContent:'center',
      }
    },
      React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'10px', width:'100%' } },
        React.createElement('i', { className:'ti ti-circle-check', style:{ fontSize:'22px', color:'#0A6B52', flexShrink:0 } }),
        React.createElement('div', { style:{ flex:1 } },
          React.createElement('div', { style:{ fontSize:'13px', fontWeight:700, color:'#065F46' } }, '農薬在庫'),
          React.createElement('div', { style:{ fontSize:'12px', color:'#065F46', fontWeight:600 } }, '全て十分あります'),
          React.createElement('div', { style:{ fontSize:'11px', color:'#6B7280', marginTop:'2px' } }, '発注アラートなし')
        ),
        React.createElement('button', {
          onClick: () => onNavigate('pesticide_master'),
          style:{
            fontSize:'11px', color:'#0A6B52', background:'#fff',
            border:'1px solid #A7F3D0', borderRadius:'7px',
            padding:'5px 10px', cursor:'pointer', fontWeight:600,
            whiteSpace:'nowrap', flexShrink:0,
          }
        }, '一覧 →')
      )
    )
  }

  // ── 要発注あり ──
  return React.createElement('div', {
    style:{
      background:'#fff', border:'1px solid #FECACA', borderRadius:'10px',
      marginBottom: _inGrid ? 0 : '20px', overflow:'hidden',
    }
  },
    // ヘッダー
    React.createElement('div', {
      style:{
        background:'#FFF1F2', padding:'10px 18px',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        borderBottom:'1px solid #FECACA',
      }
    },
      React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'8px' } },
        React.createElement('i', { className:'ti ti-alert-triangle', style:{ fontSize:'16px', color:'#C2410C' } }),
        React.createElement('span', { style:{ fontSize:'13px', fontWeight:700, color:'#9A3412' } },
          '要発注 ' + alertItems.length + '品目'
        )
      ),
      React.createElement('button', {
        onClick: () => onNavigate('pesticide_master'),
        style:{
          fontSize:'12px', color:'#C2410C', background:'#fff',
          border:'1px solid #FECACA', borderRadius:'7px',
          padding:'5px 14px', cursor:'pointer', fontWeight:600,
          whiteSpace:'nowrap',
        }
      }, '農薬マスタへ →')
    ),
    // アラートリスト
    React.createElement('div', { style:{ padding:'10px 14px', display:'flex', flexDirection:'column', gap:'7px' } },
      ...alertItems.map(p => {
        const stock  = stockOf(p)
        const thresh = threshOf(p)
        const isNeg  = stock < 0
        // 残量バー幅: 0〜100%（マイナスは0扱い）
        const barPct = thresh > 0 ? Math.max(0, Math.min(100, (stock / thresh) * 100)) : 0
        return React.createElement('div', {
          key: p.id,
          style:{
            display:'flex', alignItems:'center', gap:'14px',
            padding:'10px 14px', borderRadius:'9px',
            background: isNeg ? '#FFF1EE' : '#FFFBEB',
            border:'1px solid ' + (isNeg ? '#FECACA' : '#FDE68A'),
          }
        },
          React.createElement('i', {
            className:'ti ti-flask',
            style:{ fontSize:'16px', color: isNeg ? '#C2410C' : '#B45309', flexShrink:0 }
          }),
          // 農薬名 + 残量バー
          React.createElement('div', { style:{ flex:1, minWidth:0 } },
            React.createElement('div', { style:{ fontSize:'13px', fontWeight:600, color:'#111827', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', marginBottom:'5px' } },
              p.name
            ),
            React.createElement('div', { style:{ background:'#E5E7EB', borderRadius:'4px', height:'5px', overflow:'hidden' } },
              React.createElement('div', {
                style:{
                  height:'100%', borderRadius:'4px',
                  background: isNeg ? '#DC2626' : '#F59E0B',
                  width: barPct + '%',
                  transition:'width .4s ease',
                }
              })
            )
          ),
          // 残量数値
          React.createElement('div', { style:{ textAlign:'right', flexShrink:0 } },
            React.createElement('div', {
              style:{ fontSize:'15px', fontWeight:700, color: isNeg ? '#C2410C' : '#B45309', lineHeight:1.2 }
            }, stock + ' L'),
            React.createElement('div', { style:{ fontSize:'10px', color:'#9CA3AF', marginTop:'2px' } },
              '閾値 ' + thresh + ' L'
            )
          )
        )
      })
    )
  )
}

// =====================================================
// 棚卸し入力パネル（農薬マスタページ用）
// =====================================================
function InventoryCheckPanel({ pesticides, pesticideStock, onUpdateStock }) {
  const [inputs, setInputs] = React.useState(() => {
    const obj = {}
    pesticides.forEach(p => {
      const s = pesticideStock.find(s => s.pesticide_id === p.id)
      obj[p.id] = String(s ? s.stock_L : 0)
    })
    return obj
  })
  const [saved, setSaved] = React.useState(false)

  const handleSaveAll = () => {
    Object.entries(inputs).forEach(([id, val]) => {
      onUpdateStock(Number(id), Number(val))
    })
    setSaved(true)
    setTimeout(() => setSaved(false), 2000)
  }

  const C = { green:'#0A6B52', greenL:'#E8F5F0', red:'#C2410C', redL:'#FFF1EE', border:'#E2E8E2', muted:'#9CA3AF', ink:'#111827', sub:'#4B5563' }

  return React.createElement('div', null,
    // ヘッダーバナー
    React.createElement('div', {
      style:{
        background:'#F5F3FF', border:'1px solid #DDD6FE', borderRadius:'10px',
        padding:'14px 18px', marginBottom:'16px',
        display:'flex', alignItems:'center', gap:'10px'
      }
    },
      React.createElement('i', { className:'ti ti-clipboard-check', style:{ fontSize:'20px', color:'#6D28D9' } }),
      React.createElement('div', null,
        React.createElement('div', { style:{ fontSize:'14px', fontWeight:700, color:'#4C1D95' } }, '棚卸し入力'),
        React.createElement('div', { style:{ fontSize:'12px', color:'#6B7280', marginTop:'2px' } },
          '現在の実在庫量を確認して入力してください。「一括保存」で在庫数が更新されます。'
        )
      )
    ),
    // 農薬ごとの入力行
    React.createElement('div', { style:{ display:'flex', flexDirection:'column', gap:'8px', marginBottom:'16px' } },
      ...pesticides.map(p => {
        const s = pesticideStock.find(s => s.pesticide_id === p.id)
        const thresh = s ? s.alert_threshold_L : 0
        const current = Number(inputs[p.id] ?? 0)
        const isAlertNow = current <= thresh
        // 在庫バー: 閾値を100%の基準とし、現在値の位置を可視化（農薬一覧カードと同じ視覚言語）
        const barRatio = thresh > 0
          ? Math.max(0, Math.min(100, (current / thresh) * 100))
          : (current > 0 ? 100 : 0)
        return React.createElement('div', {
          key: p.id,
          style:{
            display:'flex', flexDirection:'column', gap:'10px',
            padding:'12px 16px', background:'#fff',
            border:'1px solid ' + (isAlertNow ? '#FECACA' : C.border),
            borderRadius:'10px',
          }
        },
          React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'12px' } },
            React.createElement('div', {
              style:{
                width:'36px', height:'36px', borderRadius:'9px', flexShrink:0,
                background: isAlertNow ? '#FFF1EE' : '#E8F5F0',
                display:'flex', alignItems:'center', justifyContent:'center'
              }
            },
              React.createElement('i', { className:'ti ti-flask', style:{ fontSize:'17px', color: isAlertNow ? C.red : C.green } })
            ),
            React.createElement('div', { style:{ flex:1, minWidth:0 } },
              React.createElement('div', { style:{ fontSize:'13px', fontWeight:600, color:C.ink, marginBottom:'2px' } }, p.name),
              React.createElement('div', { style:{ fontSize:'11px', color:C.muted } }, '発注閾値: ' + thresh + ' L')
            ),
            React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'8px', flexShrink:0 } },
              React.createElement('input', {
                type:'number', min:'0', step:'0.1',
                value: inputs[p.id],
                onChange: e => setInputs(prev => ({ ...prev, [p.id]: e.target.value })),
                style:{
                  width:'90px', padding:'7px 10px', borderRadius:'7px',
                  border:'1.5px solid ' + (isAlertNow ? '#FECACA' : '#D8E4D8'),
                  fontSize:'14px', fontWeight:700,
                  color: isAlertNow ? C.red : C.ink,
                  textAlign:'right', outline:'none', background:'#fff',
                }
              }),
              React.createElement('span', { style:{ fontSize:'12px', color:C.muted, width:'14px' } }, 'L'),
              isAlertNow && React.createElement('span', {
                style:{
                  fontSize:'10px', background:'#FFF1EE', color:C.red,
                  border:'1px solid #FECACA', borderRadius:'5px',
                  padding:'2px 7px', fontWeight:700,
                }
              }, '要発注')
            )
          ),
          React.createElement('div', { style:{ background:'#EDF2ED', borderRadius:'6px', height:'6px', overflow:'hidden' } },
            React.createElement('div', {

      saved && React.createElement('span', {
        style:{ fontSize:'13px', color:C.green, fontWeight:600, display:'flex', alignItems:'center', gap:'5px' }

        style:{

}

// =====================================================
// 使用履歴パネル（農薬マスタページ用）
// =====================================================
// =====================================================
// 月別使用量 簡易バーチャート（共通部品）
// 過去6ヶ月分の使用量を月単位の縦バーで表示。
// 農薬の使用履歴・肥料の使用履歴の両パネルで共用する。
// =====================================================
function MonthlyUsageBarChart({ records, unit, color }) {
  const C = { ink:'#111827', sub:'#4B5563', muted:'#9CA3AF', border:'#E2E8E2' }
  const barColor = color || '#1D4ED8'

  // 直近6ヶ月分のYM配列（古い→新しい）を生成
  const now = new Date()
  const months = []
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1)
    months.push({
      ym:    d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'),
      label: (d.getMonth() + 1) + '月',
    })
  }

  const totals = months.map(m =>
    records.filter(r => r.date && r.date.startsWith(m.ym))
           .reduce((a, r) => a + (Number(r.amount) || 0), 0)
  )
  const maxVal = Math.max(1, ...totals)

  return React.createElement('div', { style:{ marginBottom:'20px' } },
    React.createElement('div', { style:{ fontSize:'11px', fontWeight:700, color:C.muted, letterSpacing:'.06em', textTransform:'uppercase', marginBottom:'10px' } },
      '月別使用量（直近6ヶ月）'
    ),
    React.createElement('div', {
      style:{ background:'#fff', border:`1px solid ${C.border}`, borderRadius:'10px', padding:'16px 14px 10px', display:'flex', alignItems:'flex-end', gap:'10px', height:'120px' }
    },
      ...months.map((m, i) => {
        const v = totals[i]
        const h = Math.round((v / maxVal) * 78)
        return React.createElement('div', { key:m.ym, style:{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-end', height:'100%' } },
          React.createElement('div', { style:{ fontSize:'10px', fontWeight:700, color: v > 0 ? C.ink : C.muted, marginBottom:'4px' } },
            v > 0 ? (Math.round(v * 100) / 100) : ''
          ),
          React.createElement('div', {
            style:{
              width:'100%', maxWidth:'28px', minHeight:'2px',
              height: (v > 0 ? Math.max(h, 4) : 2) + 'px',
              background: v > 0 ? barColor : '#EDF2ED',
              borderRadius:'4px 4px 2px 2px',
              transition:'height .4s ease',
            }
          }),
          React.createElement('div', { style:{ fontSize:'10px', color:C.sub, fontWeight:600, marginTop:'6px' } }, m.label)
        )
      })
    )
  )
}

function PesticideHistoryPanel({ pesticides, records }) {
  const [selectedId, setSelectedId] = React.useState(
    pesticides.length > 0 ? pesticides[0].id : null
  )

  // 今月・先月の判定
  const now = new Date()
  const thisYM = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0')
  const lastDate = new Date(now.getFullYear(), now.getMonth() - 1, 1)
  const lastYM = lastDate.getFullYear() + '-' + String(lastDate.getMonth() + 1).padStart(2, '0')

  const sprayRecords = records
    .filter(r => r.work_type === '農薬散布' && r.pesticide_id === selectedId)
    .sort((a, b) => b.date.localeCompare(a.date))

  const totalUsed   = sprayRecords.reduce((a, r) => a + (Number(r.amount) || 0), 0)
  const thisMonth   = sprayRecords.filter(r => r.date.startsWith(thisYM)).reduce((a, r) => a + (Number(r.amount) || 0), 0)
  const lastMonth   = sprayRecords.filter(r => r.date.startsWith(lastYM)).reduce((a, r) => a + (Number(r.amount) || 0), 0)
  const diff        = Math.round((thisMonth - lastMonth) * 100) / 100
  const diffSign    = diff > 0 ? '+' : ''

  const C = { green:'#0A6B52', blue:'#1D4ED8', blueL:'#EFF6FF', greenL:'#F0FDF4', border:'#E2E8E2', muted:'#9CA3AF', ink:'#111827', sub:'#4B5563' }

  return React.createElement('div', null,
    // 農薬セレクタ（チップ）— 横スクロール時の見切れ防止フェード付き
    React.createElement('div', { style:{ position:'relative', marginBottom:'20px' } },
      React.createElement('div', { style:{ display:'flex', gap:'8px', overflowX:'auto', paddingBottom:'4px' } },
        ...pesticides.map(p => {
          const isActiveChip = selectedId === p.id
          return React.createElement('button', {
            key: p.id,
            onClick: () => setSelectedId(p.id),
            style:{
              padding:'7px 16px', borderRadius:'20px', flexShrink:0, whiteSpace:'nowrap',
              border:'1.5px solid ' + (isActiveChip ? C.green : C.border),
              background: isActiveChip ? C.green : '#fff',
              color: isActiveChip ? '#fff' : C.sub,
              fontSize:'12px', fontWeight:600, cursor:'pointer',
              transition:'all .15s', fontFamily:"'Inter',sans-serif",
            }
          }, p.name)
        })
      ),
      // 左フェード
      React.createElement('div', {
        style:{
          position:'absolute', left:0, top:0, bottom:'4px', width:'20px',
          background:'linear-gradient(90deg, #fff 0%, rgba(255,255,255,0) 100%)',
          pointerEvents:'none',
        }
      }),
      // 右フェード
      React.createElement('div', {
        style:{
          position:'absolute', right:0, top:0, bottom:'4px', width:'20px',
          background:'linear-gradient(270deg, #fff 0%, rgba(255,255,255,0) 100%)',
          pointerEvents:'none',
        }
      })
    ),

    // 月次サマリーカード（3枚）
    React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'10px', marginBottom:'20px' } },
      // 総使用回数
      React.createElement('div', { style:{ background:C.greenL, border:'1px solid #A7F3D0', borderRadius:'10px', padding:'14px 16px' } },
        React.createElement('div', { style:{ fontSize:'11px', color:'#6B7280', marginBottom:'4px', display:'flex', alignItems:'center', gap:'4px' } },
          React.createElement('i', { className:'ti ti-repeat', style:{ fontSize:'12px' } }), '総使用回数'
        ),
        React.createElement('div', { style:{ fontSize:'24px', fontWeight:700, color:C.green } }, sprayRecords.length + ' 回')
      ),
      // 今月使用量
      React.createElement('div', { style:{ background:C.blueL, border:'1px solid #BFDBFE', borderRadius:'10px', padding:'14px 16px' } },
        React.createElement('div', { style:{ fontSize:'11px', color:'#6B7280', marginBottom:'4px', display:'flex', alignItems:'center', gap:'4px' } },
          React.createElement('i', { className:'ti ti-calendar-month', style:{ fontSize:'12px' } }), '今月使用量'
        ),
        React.createElement('div', { style:{ fontSize:'24px', fontWeight:700, color:C.blue } },
          Math.round(thisMonth * 100) / 100 + ' L'

      ),
      // 先月比
      React.createElement('div', { style:{ background: diff > 0 ? '#FFF1EE' : diff < 0 ? C.greenL : '#F9FAFB', border:'1px solid ' + (diff > 0 ? '#FECACA' : diff < 0 ? '#A7F3D0' : C.border), borderRadius:'10px', padding:'14px 16px' } },
        React.createElement('div', { style:{ fontSize:'11px', color:'#6B7280', marginBottom:'4px', display:'flex', alignItems:'center', gap:'4px' } },
          React.createElement('i', { className:'ti ti-trending-up', style:{ fontSize:'12px' } }), '先月比'
        ),
        React.createElement('div', { style:{ fontSize:'24px', fontWeight:700, color: diff > 0 ? '#C2410C' : diff < 0 ? C.green : C.muted } },
          lastMonth === 0 && thisMonth === 0 ? '—' : diffSign + diff + ' L'

    ),

    // 月別使用量バーチャート
    React.createElement(MonthlyUsageBarChart, { records: sprayRecords, unit:'L', color: C.blue }),

    // 時系列リスト
    React.createElement('div', { style:{ fontSize:'11px', fontWeight:700, color:C.muted, letterSpacing:'.06em', textTransform:'uppercase', marginBottom:'10px' } }, '使用履歴'),

            }

              style:{
                width:'8px', height:'8px', borderRadius:'50%',
                background:C.green, flexShrink:0
              }
            }),
            React.createElement('div', { style:{ flex:1 } },
              React.createElement('div', { style:{ fontSize:'13px', fontWeight:600, color:C.ink } }, r.date),
              React.createElement('div', { style:{ fontSize:'11px', color:C.muted, marginTop:'2px', display:'flex', gap:'10px' } },
                React.createElement('span', null, '👤 ' + r.worker),
                r.weather && React.createElement('span', null, '☁ ' + r.weather)
              )
            ),
            React.createElement('div', { style:{ fontSize:'14px', fontWeight:700, color:C.blue, flexShrink:0 } },
              (Number(r.amount) || 0) + ' L'

          ))
        )

}

// =====================================================
// 在庫アラートウィジェット（ダッシュボード用）
// 発注アラート閾値以下の農薬を一覧表示
// =====================================================
function PesticideStockWidget({ pesticides, pesticideStock, onNavigate }) {
  const stockOf  = (p) => {
    const s = pesticideStock.find(s => s.pesticide_id === p.id)
    return s ? s.stock_L : (p.stock_L ?? 0)
  }
  const threshOf = (p) => {
    const s = pesticideStock.find(s => s.pesticide_id === p.id)
    return s ? s.alert_threshold_L : (p.alert_threshold_L ?? 0)
  }

  const alertItems = pesticides.filter(p => stockOf(p) <= threshOf(p))
  const hasAlert   = alertItems.length > 0
  // 緊急度が高い（閾値からの不足量が大きい）順にソート
  const sortedAlertItems = [...alertItems].sort((a, b) => (stockOf(a) - threshOf(a)) - (stockOf(b) - threshOf(b)))
  const PREVIEW_COUNT = 3
  const [showAll, setShowAll] = React.useState(false)
  const visibleItems = showAll ? sortedAlertItems : sortedAlertItems.slice(0, PREVIEW_COUNT)
  const hiddenCount  = sortedAlertItems.length - visibleItems.length

  if (!hasAlert) {
    return React.createElement('div', {
      style:{
        background:'#ECFDF5', border:'1px solid #A7F3D0', borderRadius:'10px',
        padding:'12px 16px', marginBottom:'20px',
        display:'flex', alignItems:'center', gap:'12px'
      }
    },
      React.createElement('i', { className:'ti ti-circle-check', style:{ fontSize:'20px', color:'#0A6B52' } }),
      React.createElement('div', { style:{ flex:1 } },
        React.createElement('div', { style:{ fontSize:'14px', fontWeight:600, color:'#065F46' } }, '農薬在庫は全て十分あります'),
        React.createElement('div', { style:{ fontSize:'12px', color:'#6B7280', marginTop:'2px' } },
          '発注アラート閾値を超えている農薬はありません'
        )
      ),
      React.createElement('button', {
        onClick: () => onNavigate('pesticide_master'),
        style:{
          fontSize:'12px', color:'#0A6B52', background:'#fff',
          border:'1px solid #A7F3D0', borderRadius:'6px',
          padding:'5px 12px', cursor:'pointer', fontWeight:600,
          whiteSpace:'nowrap',
        }

function FertilizerStockWidget({ fertilizers, fertilizerStock, onNavigate, _inGrid }) {
  const stockOf  = (f) => {
    const s = fertilizerStock.find(s => s.fertilizer_id === f.id)
    return s ? s.stock_kg : (f.stock_kg ?? 0)
  }
  const threshOf = (f) => {
    const s = fertilizerStock.find(s => s.fertilizer_id === f.id)
    return s ? s.alert_threshold_kg : (f.alert_threshold_kg ?? 0)
  }

  const alertItems = fertilizers.filter(f => stockOf(f) <= threshOf(f))
  const hasAlert   = alertItems.length > 0
  // 緊急度が高い（閾値からの不足量が大きい）順にソート
  const sortedAlertItems = [...alertItems].sort((a, b) => (stockOf(a) - threshOf(a)) - (stockOf(b) - threshOf(b)))
  const PREVIEW_COUNT = 3
  const [showAll, setShowAll] = React.useState(false)
  const visibleItems = showAll ? sortedAlertItems : sortedAlertItems.slice(0, PREVIEW_COUNT)
  const hiddenCount  = sortedAlertItems.length - visibleItems.length

  { key: '休閑',   label: '休閑'  },

const SUMMARY_MAX_VISIBLE = 9  // 3列 × 3行

function FieldSummaryTabPanel({ fields, records }) {
  const [activeTab, setActiveTab] = React.useState('all')
  const [showAll,   setShowAll]   = React.useState(false)

  // タブ切り替え時はリセット
  const handleTab = (key) => { setActiveTab(key); setShowAll(false) }

  const filtered = activeTab === 'all' ? fields : fields.filter(f => f.status === activeTab)
  const visible  = showAll ? filtered : filtered.slice(0, SUMMARY_MAX_VISIBLE)
