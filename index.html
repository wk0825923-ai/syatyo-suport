  const crops = ['レタス','米','とうもろこし','ターサイ','トマト','大豆','玉ねぎ']

  const handleAdd = () => {
    if (!form.name || !form.crop) return
    const colors = ['#4ecca3','#f6ad55','#63b3ed','#d4a2f7','#fc8181']
    onAdd({ ...form, id:Date.now(), area_are:Number(form.area_are)||0, lat:35.384+Math.random()*.01, lng:139.924+Math.random()*.01, color:colors[fields.length % colors.length] })
    setForm({ name:'', area_are:'', crop:'', status:'栽培中' })
    setShowAdd(false)
  }

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return
    const map = L.map(mapRef.current).setView([35.384, 139.925], 14)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map)
    mapInstanceRef.current = map
    return () => { map.remove(); mapInstanceRef.current = null }
  }, [])

  React.useEffect(() => {
    const map = mapInstanceRef.current
    if (!map) return
    map.eachLayer(l => { if (l instanceof L.CircleMarker) map.removeLayer(l) })
    fields.forEach(f => {
      L.circleMarker([f.lat, f.lng], { color:f.color, fillColor:f.color, fillOpacity:.7, radius:10, weight:2 })
        .bindPopup('<b>' + f.name + '</b><br>' + f.crop + ' / ' + f.area_are + 'a — ' + f.status)

        React.createElement('div', { style:{ fontSize:'11px', color:'#4a5568', marginTop:'2px' } }, '達成')

    ),

          )

            React.createElement('div', { style:{ width:18, height:18, borderRadius:'4px', border:'1px solid', borderColor: c.is_cleared ? '#0f6e56' : '#2a2f3d', background: c.is_cleared ? '#0d4f3e' : 'transparent', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontSize:12, color:'#4ecca3' } },

}

    React.createElement('div', { className:'page-sub' }, staff.length + '名登録 / 技能実習生: ' + staff.filter(s=>s.role==='trainee').length + '名'),
    showAdd && React.createElement('div', { className:'card', style:{ marginBottom:'16px', maxWidth:480 } },
      React.createElement('div', { className:'section-title' }, 'スタッフ登録'),
      React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' } },
        React.createElement('div', { className:'form-group' },
          React.createElement('label', { className:'form-label' }, '氏名'),
          React.createElement('input', { type:'text', className:'form-input', value:form.name, onChange: e => setForm(f=>({...f,name:e.target.value})), placeholder:'山田 一郎' })
        ),
        React.createElement('div', { className:'form-group' },
          React.createElement('label', { className:'form-label' }, '国籍'),
          React.createElement('select', { className:'form-select', value:form.nationality, onChange: e => setForm(f=>({...f,nationality:e.target.value})) },
            Object.entries(natLabel).map(([v,l]) => React.createElement('option', { key:v, value:v }, l))
          )
        ),
        React.createElement('div', { className:'form-group' },
          React.createElement('label', { className:'form-label' }, '役割'),
          React.createElement('select', { className:'form-select', value:form.role, onChange: e => setForm(f=>({...f,role:e.target.value})) },
            Object.entries(roleLabel).map(([v,l]) => React.createElement('option', { key:v, value:v }, l))
          )
        ),
        React.createElement('div', { className:'form-group' },
          React.createElement('label', { className:'form-label' }, 'ビザ期限（外国籍のみ）'),
          React.createElement('input', { type:'date', className:'form-input', value:form.visa_expires_at, onChange: e => setForm(f=>({...f,visa_expires_at:e.target.value})) })
        )
      ),
      React.createElement('div', { style:{ display:'flex', gap:'8px' } },
        React.createElement('button', { className:'btn btn-primary', disabled:!form.name, onClick:handleAdd }, '登録'),
        React.createElement('button', { className:'btn btn-ghost', onClick: () => setShowAdd(false) }, 'キャンセル')
      )
    ),
    staff.map((s, i) => {
      const daysLeft = s.visa_expires_at ? Math.ceil((new Date(s.visa_expires_at) - new Date()) / 86400000) : null
      const isAlert  = daysLeft !== null && daysLeft <= 60
      return React.createElement('div', { key:s.id, className:'card-sm', style:{ marginBottom:'8px', display:'flex', alignItems:'center', gap:'14px' } },
        React.createElement('div', { className:'staff-avatar', style:{ background: avatarColors[i % avatarColors.length], color:'#c4cdd8' } }, s.avatar),
        React.createElement('div', { style:{ flex:1 } },
          React.createElement('div', { style:{ fontSize:'14px', fontWeight:500, color:'#c4cdd8' } }, s.name),
          React.createElement('div', { style:{ fontSize:'12px', color:'#4a5568', marginTop:'2px' } }, (natLabel[s.nationality] || s.nationality) + ' · ' + roleLabel[s.role])
        ),
        isAlert && React.createElement('span', { className:'badge ' + (daysLeft <= 30 ? 'badge-red' : 'badge-amber') }, 'ビザ残' + daysLeft + '日'),
        !isAlert && s.visa_expires_at && React.createElement('span', { className:'badge badge-gray' }, s.visa_expires_at),
        !s.visa_expires_at && React.createElement('span', { className:'badge badge-green' }, '在留問題なし'),
        React.createElement('button', { style:{ padding:'5px 10px', fontSize:'12px', color:'#4a5568', background:'transparent', border:'1px solid #1e2535', borderRadius:'6px', cursor:'pointer' }, onClick: () => onDelete(s.id) }, '削除')
      )
    })
  )
}

// --- 設定 ---
function Settings() {
  return React.createElement('div', { className:'page' },
    React.createElement('div', { className:'page-title' }, '設定'),
    React.createElement('div', { className:'page-sub'   }, '農園情報とシステム設定'),
    React.createElement('div', { className:'card', style:{ maxWidth:560, marginBottom:'16px' } },
      React.createElement('div', { className:'section-title' }, '農園情報'),
      [['農園名','中川農園'],['代表者','中川 誠'],['所在地','神奈川県相模原市'],['連絡先','042-xxx-xxxx']].map(([k,v]) =>
        React.createElement('div', { key:k, className:'form-group' },
          React.createElement('label', { className:'form-label' }, k),
          React.createElement('input', { type:'text', className:'form-input', defaultValue:v })
        )
      ),
      React.createElement('button', { className:'btn btn-primary' }, '保存')
    ),
    React.createElement('div', { className:'card', style:{ maxWidth:560 } },
      React.createElement('div', { className:'section-title' }, 'Supabase 接続設定'),
      React.createElement('div', { className:'sup-note', style:{ marginBottom:'16px' } },
        '現在: モックデータ動作中 — Supabase URL を設定するとリアルDBに切り替わります'
      ),
      React.createElement('div', { className:'form-group' },
        React.createElement('label', { className:'form-label' }, 'Supabase URL'),
        React.createElement('input', { type:'text', className:'form-input', placeholder:'https://xxxx.supabase.co' })
      ),
      React.createElement('div', { className:'form-group' },
        React.createElement('label', { className:'form-label' }, 'Anon Key'),
        React.createElement('input', { type:'password', className:'form-input', placeholder:'eyJhbGciOiJIUzI1NiIs...' })
      ),
      React.createElement('button', { className:'btn btn-primary' }, '接続テスト')
    )
  )
}

// =====================================================
// A-3: App — ルーティング + グローバル state
// =====================================================
function App() {
  // --- グローバル state ---
  const [page,    setPage]    = React.useState('dashboard')
  const [fields,  setFields]  = React.useState(INITIAL_FIELDS)
  const [records, setRecords] = React.useState(INITIAL_RECORDS)
  const [staff,   setStaff]   = React.useState(INITIAL_STAFF)
  const [gap,     setGap]     = React.useState(INITIAL_GAP_CHECKS)
  const [rentals, setRentals] = React.useState(INITIAL_RENTALS)

  // --- pages オブジェクト（ルーティング本体） ---
  const pages = {
    dashboard: React.createElement(Dashboard, { fields, records, staff, gap }),
    records:   React.createElement(DailyRecord, {
                 fields, pesticides: INITIAL_PESTICIDES, records,
                 onSave: r => setRecords(prev => [...prev, r])
               }),
    fields:    React.createElement(FieldList, {
                 fields,
                 onAdd:    f  => setFields(prev => [...prev, f]),
                 onDelete: id => setFields(prev => prev.filter(f => f.id !== id))
               }),
    gap:       React.createElement(GapSupport, {
                 gap,
                 onToggle: id => setGap(prev => prev.map(c => c.id === id ? { ...c, is_cleared: !c.is_cleared } : c))
               }),
    equipment: React.createElement(Equipment, {
                 rentals,
                 onAdd: r => setRentals(prev => [...prev, r])
               }),
    staff:     React.createElement(StaffList, {
                 staff,
                 onAdd:    s  => setStaff(prev => [...prev, s]),
                 onDelete: id => setStaff(prev => prev.filter(s => s.id !== id))
               }),
    settings:  React.createElement(Settings, null),
  }

  return React.createElement('div', { style:{ display:'flex', height:'100vh', overflow:'hidden' } },
    React.createElement(Sidebar, { current: page, onChange: setPage }),
    React.createElement('main', { className:'main' }, pages[page])
  )
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App))
</script>
</body>
